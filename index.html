<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Chungli Toastmasters Slot Machine</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Space+Mono:wght@400;700&display=swap');

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        /* 使用復古世界地圖背景 */
        background-image: url('https://img.freepik.com/free-photo/vintage-world-map-background-high-quality-texture_53876-133644.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #f0ebd6; /* 備用背景色 */
        overflow: hidden;
    }

    /* 隱藏標題文字 */
    .sr-only {
        display: none;
    }

    .sm-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .sm-stage {
        position: relative;
        width: 410px;
        height: 400px;
    }

    .cab {
        position: absolute;
        top: 60px;
        left: 0;
        width: 252px;
        background: #131d06;
        border: 3px solid #c9a030;
        border-radius: 10px 10px 7px 7px;
        overflow: hidden;
        /* 強化立體陰影 */
        box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    }

    .cab-inner{border:1px solid #7a6018;border-radius:7px 7px 4px 4px;overflow:hidden;}
    .cpanel{background:#0b1103;text-align:center;}
    .cpanel.tp{padding:8px 10px 7px;border-bottom:2px solid #c9a030;}
    .cpanel.bp{padding:7px 10px 10px;border-top:2px solid #c9a030;}
    .pdeco{font-family:'Space Mono',monospace;font-size:9px;color:#c9a030;letter-spacing:4px;line-height:1.8;}
    .pline{border:none;border-top:1px solid #5a4808;margin:3px 12px;}
    .ptit{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#f2c828;letter-spacing:3px;line-height:1.05;}
    .psub{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;font-style:italic;color:#c9a030;letter-spacing:5px;}
    .rsect{padding:12px 14px;background:#162309;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .rframe{background:#c9a030;border-radius:5px;padding:3px;width:100%;}
    .rframe-inner{background:#b8860c;border-radius:3px;padding:2px;}
    .rwin{background:#f0ebd6;border-radius:2px;height:90px;overflow:hidden;position:relative;width:100%;}
    .rwin::before{content:'';position:absolute;top:0;left:0;right:0;height:22px;background:linear-gradient(to bottom,#f0ebd6,transparent);z-index:2;pointer-events:none;}
    .rwin::after{content:'';position:absolute;bottom:0;left:0;right:0;height:22px;background:linear-gradient(to top,#f0ebd6,transparent);z-index:2;pointer-events:none;}
    .sline{position:absolute;left:6px;right:6px;top:50%;height:1px;background:#c9a030;transform:translateY(-50%);z-index:3;opacity:.45;}
    .rtrack{display:flex;flex-direction:column;align-items:center;position:absolute;width:100%;}
    .ritem{height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;width:100%;text-align:center;gap:2px;}
    .ren{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#1a1205;line-height:1;}
    .rzh{font-family:'Space Mono',monospace;font-size:10px;color:#888;letter-spacing:1px;}
    .ritem.hi .ren{color:#8b1800;}
    .ritem.hi .rzh{color:#b8960c;}
    .scnt{font-family:'Space Mono',monospace;font-size:10px;color:#c9a030;letter-spacing:2px;min-height:14px;}
    .lmount{position:absolute;top:210px;left:249px;width:14px;height:26px;background:#8a7010;border-radius:0 3px 3px 0;transform:translateY(-50%);border-right:2px solid #c9a030;border-top:1px solid #c9a030;border-bottom:1px solid #c9a030;}
    .larm{position:absolute;top:210px;left:261px;transform-origin:0 0;transform:rotate(0deg);transition:transform 0.15s ease-in;cursor:pointer;}
    .lrod{position:absolute;top:-128px;left:-4px;width:8px;height:128px;background:#1c1c1c;border-radius:3px 3px 0 0;}
    .lball{position:absolute;top:-164px;left:-17px;width:34px;height:34px;border-radius:50%;background:#c81000;border:3px solid #ee3311;transition:background .1s;}
    .lstub{position:absolute;top:0;left:-4px;width:8px;height:14px;background:#1c1c1c;border-radius:0 0 3px 3px;}
    .larm:not(.off):hover .lball{background:#dd1500;}
    .larm.off{cursor:default;opacity:.6;}
    </style>
</head>

<body>

<div class="sm-wrap">
  <h2 class="sr-only">Chungli Toastmasters 世界旅遊拉霸機</h2>
  <div class="sm-stage">
    <div class="cab">
      <div class="cab-inner">
        <div class="cpanel tp">
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
          <hr class="pline">
          <div class="ptit">CHUNGLI</div>
          <div class="psub">TOASTMASTERS</div>
          <hr class="pline">
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
        </div>
        <div class="rsect">
          <div class="rframe">
            <div class="rframe-inner">
              <div class="rwin" id="reelWindow">
                <div class="sline"></div>
                <div class="rtrack" id="reelTrack">
                  <div class="ritem">
                    <span class="ren">— — —</span>
                    <span class="rzh">拉右側把手</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="scnt" id="spinCount"></div>
        </div>
        <div class="cpanel bp">
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
          <hr class="pline">
          <div class="ptit">CHUNGLI</div>
          <div class="psub">TOASTMASTERS</div>
          <hr class="pline">
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
        </div>
      </div>
    </div>
    <div class="lmount"></div>
    <div class="larm" id="leverArm" onclick="spin()">
      <div class="lrod"></div>
      <div class="lball"></div>
      <div class="lstub"></div>
    </div>
  </div>
</div>

<script>
const countries=[
  {en:"JAPAN",zh:"日本"},{en:"HONG KONG",zh:"香港"},{en:"SOUTH KOREA",zh:"韓國"},
  {en:"MACAU",zh:"澳門"},{en:"THAILAND",zh:"泰國"},{en:"VIETNAM",zh:"越南"},
  {en:"MALAYSIA",zh:"馬來西亞"},{en:"INDONESIA",zh:"印尼"},{en:"PHILIPPINES",zh:"菲律賓"},
  {en:"FRANCE",zh:"法國"},{en:"ITALY",zh:"義大利"},{en:"SPAIN",zh:"西班牙"},
  {en:"SWITZERLAND",zh:"瑞士"},{en:"NETHERLANDS",zh:"荷蘭"},{en:"TURKEY",zh:"土耳其"},
  {en:"EGYPT",zh:"埃及"},{en:"SOUTH AFRICA",zh:"南非"},{en:"NORWAY",zh:"挪威"},
  {en:"AUSTRALIA",zh:"澳洲"},{en:"NEW ZEALAND",zh:"紐西蘭"},{en:"USA",zh:"美國"},
  {en:"UK",zh:"英國"},{en:"CZECH REPUBLIC",zh:"捷克"},{en:"PORTUGAL",zh:"葡萄牙"},
  {en:"BRAZIL",zh:"巴西"},{en:"MEXICO",zh:"墨西哥"},{en:"PERU",zh:"秘魯"}
];

let spinning=false,spinCount=0,lastResult=null,audioCtx=null;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTick(freq,vol){
  try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='square';o.frequency.setValueAtTime(freq||400,ctx.currentTime);
  g.gain.setValueAtTime(vol||0.06,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.07);
  o.start(ctx.currentTime);o.stop(ctx.currentTime+0.07);}catch(e){}
}

function playWin(){
  try{const ctx=getAudio();
  [523,659,784,1047].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='triangle';
    const t=ctx.currentTime+i*0.13;
    o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.15,t+0.04);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
    o.start(t);o.stop(t+0.28);
  });}catch(e){}
}

function buildReel(final,extra){
  const track=document.getElementById('reelTrack');
  track.innerHTML='';
  const pool=[...countries,...countries,...countries].sort(()=>Math.random()-.5);
  const items=[...pool.slice(0,extra),final,...pool.slice(0,3)];
  items.forEach(c=>{
    const d=document.createElement('div');
    d.className='ritem';
    d.innerHTML=`<span class="ren">${c.en}</span><span class="rzh">${c.zh}</span>`;
    track.appendChild(d);
  });
}

function spin(){
  if(spinning)return;
  spinning=true;spinCount++;
  const arm=document.getElementById('leverArm');
  arm.classList.add('off');

  let pool=[...countries];
  if(lastResult&&pool.length>1)pool=pool.filter(c=>c.en!==lastResult.en);
  const final=pool[Math.floor(Math.random()*pool.length)];
  lastResult=final;

  arm.style.transition='transform 0.18s ease-in';
  arm.style.transform='rotate(115deg)';

  setTimeout(()=>{
    const T=40,track=document.getElementById('reelTrack'),itemH=90;
    buildReel(final,T);
    track.style.transition='none';
    track.style.transform='translateY(0px)';

    let tickInt=65,elapsed=0;
    function doTick(){
      playTick(280+Math.random()*160,elapsed>3200?0.11:0.065);
      tickInt=elapsed<3200?55+Math.random()*45:80+elapsed*0.06;
      elapsed+=tickInt;
      if(elapsed<4700)setTimeout(doTick,tickInt);
    }
    setTimeout(doTick,30);

    const phases=[
      {d:600,e:'cubic-bezier(0.4,0,1,1)',y:-(itemH*8)},
      {d:2200,e:'linear',y:-(itemH*(T-6))},
      {d:800,e:'cubic-bezier(0,0,0.2,1)',y:-(itemH*T)},
      {d:380,e:'cubic-bezier(0.34,1.56,0.64,1)',y:-(itemH*T)+10},
      {d:180,e:'ease-in-out',y:-(itemH*T)}
    ];

    function runPhase(i){
      if(i>=phases.length){endSpin(final);return;}
      const p=phases[i];
      setTimeout(()=>{
        track.style.transition=`transform ${p.d}ms ${p.e}`;
        track.style.transform=`translateY(${p.y}px)`;
        setTimeout(()=>runPhase(i+1),p.d);
      },10);
    }
    requestAnimationFrame(()=>runPhase(0));
  },200);
}

function endSpin(country){
  spinning=false;
  playWin();
  const track=document.getElementById('reelTrack');
  const items=track.querySelectorAll('.ritem');
  if(items[40])items[40].classList.add('hi');
  document.getElementById('spinCount').textContent=`已抽 ${spinCount} 次`;
  const arm=document.getElementById('leverArm');
  setTimeout(()=>{
    arm.style.transition='transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
    arm.style.transform='rotate(0deg)';
    setTimeout(()=>arm.classList.remove('off'),600);
  },400);
}
</script>
</body>
</html>

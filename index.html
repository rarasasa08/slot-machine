<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Chungli Toastmasters 2s Ultra Fast Slot</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Space+Mono:wght@400;700&display=swap');

    body {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        display: flex; justify-content: center; align-items: center;
        background-color: #0a2e1f; overflow: hidden; font-family: 'Space Mono', monospace;
        perspective: 2000px;
    }

    .sm-stage {
        position: relative; height: 66vh; width: 55vw; min-width: 450px;
        display: flex; justify-content: center; align-items: center;
        transform-style: preserve-3d;
    }

    .cab {
        position: relative; width: 100%; height: 100%; background: #131d06;
        border: 0.8vmin solid #c9a030; border-radius: 2vmin;
        box-shadow: 0 5vh 10vh rgba(0,0,0,0.8); z-index: 2; display: flex; flex-direction: column;
        transform: translateZ(0px);
    }

    .cab-inner { border: 0.2vmin solid #7a6018; border-radius: 1.5vmin; overflow: hidden; height: 100%; display: flex; flex-direction: column; }
    .cpanel { background:#0b1103; text-align:center; flex: 0 0 22%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .cpanel.tp { border-bottom: 0.4vmin solid #c9a030; }
    .cpanel.bp { border-top: 0.4vmin solid #c9a030; }
    .pdeco { font-size: 1.8vmin; color: #c9a030; letter-spacing: 0.8vmin; }
    .pline { border: none; border-top: 0.2vmin solid #5a4808; margin: 0.5vh 10%; width: 80%; }
    .ptit { font-family: 'Playfair Display', serif; font-size: 6vmin; font-weight: 900; color: #f2c828; letter-spacing: 0.6vmin; line-height: 1.1; }
    .psub { font-family: 'Playfair Display', serif; font-size: 2.2vmin; font-weight: 700; color: #c9a030; letter-spacing: 1.2vmin; }
    .rsect { flex: 1; padding: 2vmin; background: #162309; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5vmin; }
    .rframe { background: #c9a030; border-radius: 1vmin; padding: 0.6vmin; width: 90%; }
    .rframe-inner { background: #b8860c; border-radius: 0.8vmin; padding: 0.4vmin; }
    .rwin { background: #f0ebd6; height: 20vh; overflow: hidden; position: relative; width: 100%; }
    .rwin::before { content:''; position:absolute; top:0; left:0; right:0; height:5vh; background:linear-gradient(to bottom,#f0ebd6,transparent); z-index:2; }
    .rwin::after { content:''; position:absolute; bottom:0; left:0; right:0; height:5vh; background:linear-gradient(to top,#f0ebd6,transparent); z-index:2; }
    .sline { position:absolute; left:1vmin; right:1vmin; top:50%; height:0.3vmin; background:#c9a030; transform:translateY(-50%); z-index:3; opacity:.45; }
    .rtrack { display:flex; flex-direction:column; align-items:center; position:absolute; width:100%; }
    .ritem { height: 20vh; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; width: 100%; text-align: center; }
    .ren { font-family: 'Playfair Display', serif; font-size: 7vmin; font-weight: 900; color: #1a1205; line-height: 1; }
    .rzh { font-family: 'Space Mono', monospace; font-size: 2.5vmin; color: #888; }
    .ritem.hi .ren { color: #8b1800; }
    .scnt { font-family: 'Space Mono', monospace; font-size: 2.2vmin; color: #c9a030; margin-top: 1vh; min-height: 1.5em; }

    .lmount { 
        position: absolute; top: 50%; right: -3vmin; width: 3vmin; height: 8vh; 
        background: #8a7010; border-radius: 0 0.8vmin 0.8vmin 0; transform: translateY(-50%); 
        border: 0.2vmin solid #c9a030; z-index: 1; 
        box-shadow: 2px 0 5px rgba(0,0,0,0.5);
    }

    .larm { 
        position: absolute; top: 50%; right: -5vmin; width: 6vmin; height: 4vh; cursor: pointer; z-index: 3; 
        transform-origin: center bottom; transform-style: preserve-3d;
        transform: translateY(-50%) rotateX(-20deg); 
        transition: transform 0.1s ease-in;
    }

    .lrod { 
        position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 1.8vmin; height: 28vh; 
        background: linear-gradient(to right, #333, #1c1c1c 30%, #1c1c1c 70%, #333);
        border-radius: 0.9vmin; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    .lball { 
        position: absolute; top: -31vh; left: 50%; transform: translateX(-50%);
        width: 8vmin; height: 8vmin; border-radius: 50%; 
        background: radial-gradient(circle at 30% 30%, #ee3311, #c81000 60%, #800000);
        border: 0.4vmin solid #ee3311;
        box-shadow: 3px 3px 10px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(0,0,0,0.5);
    }

    .larm.off { cursor: default; opacity: .8; }
    
    .footer {
        position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
        font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2.5vmin;
        color: rgba(201, 160, 48, 0.5); letter-spacing: 3px; text-align: center; width: 100%;
    }
    </style>
</head>

<body>
<div class="sm-stage">
    <div class="cab">
      <div class="cab-inner">
        <div class="cpanel tp">
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
          <hr class="pline">
          <div class="ptit">CHUNGLI</div>
          <div class="psub">TOASTMASTERS</div>
          <hr class="pline">
        </div>
        <div class="rsect">
          <div class="rframe">
            <div class="rframe-inner">
              <div class="rwin" id="reelWindow">
                <div class="sline"></div>
                <div class="rtrack" id="reelTrack"><div class="ritem"><span class="ren">— — —</span><span class="rzh">拉動前方把手</span></div></div>
              </div>
            </div>
          </div>
          <div class="scnt" id="spinCount"></div>
        </div>
        <div class="cpanel bp">
          <hr class="pline">
          <div class="ptit">CHUNGLI</div>
          <div class="psub">TOASTMASTERS</div>
          <div class="pdeco">✦ &nbsp; ✦ &nbsp; ✦</div>
        </div>
      </div>
    </div>
    <div class="lmount"></div>
    <div class="larm" id="leverArm" onclick="spin()">
      <div class="lrod"></div>
      <div class="lball"></div>
    </div>
</div>
<div class="footer">By Annzo</div>

<script>
const countries=[
  {en:"JAPAN",zh:"日本"}, {en:"KOREA",zh:"韓國"}, {en:"ICELAND",zh:"冰島"},
  {en:"BRAZIL",zh:"巴西"}, {en:"INDIA",zh:"印度"}, {en:"THAILAND",zh:"泰國"},
  {en:"VIETNAM",zh:"越南"}, {en:"MALTA",zh:"馬爾他"}, {en:"CUBA",zh:"古巴"},
  {en:"PHILIPPINES",zh:"菲律賓"}, {en:"GREECE",zh:"希臘"}, {en:"USA",zh:"美國"},
  {en:"CANADA",zh:"加拿大"}, {en:"FRANCE",zh:"法國"}, {en:"ITALY",zh:"義大利"},
  {en:"SWITZERLAND",zh:"瑞士"}, {en:"GERMANY",zh:"德國"}, {en:"UK",zh:"英國"},
  {en:"NETHERLANDS",zh:"荷蘭"}, {en:"TURKEY",zh:"土耳其"}, {en:"MEXICO",zh:"墨西哥"},
  {en:"SPAIN",zh:"西班牙"}, {en:"AUSTRALIA",zh:"澳洲"},
  {en:"NEW ZEALAND",zh:"紐西蘭"}
];

// 預設前四次出現順序：日本、義大利、馬爾他、冰島
const presetOrder = ["JAPAN", "ITALY", "MALTA", "ICELAND"];
let spinning=false, spinCount=0, historyQueue=[];

function getItemHeight() { return window.innerHeight * 0.2; }
function getAudio(){if(!window.audioCtx)window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();return window.audioCtx;}
function playTick(freq,vol){ try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(freq||400,ctx.currentTime);g.gain.setValueAtTime(vol||0.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.07);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.07);}catch(e){}}
function playWin(){ try{const ctx=getAudio();[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='triangle';const t=ctx.currentTime+i*0.13;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.04);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);o.start(t);o.stop(t+0.28);});}catch(e){}}

function buildReel(final,extra){
    const track=document.getElementById('reelTrack');
    track.innerHTML='';
    const pool=[...countries,...countries].sort(()=>Math.random()-.5);
    const items=[...pool.slice(0,extra),final,...pool.slice(0,2)];
    items.forEach(c=>{
        const d=document.createElement('div');
        d.className='ritem';
        d.innerHTML=`<span class="ren">${c.en}</span><span class="rzh">${c.zh}</span>`;
        track.appendChild(d);
    });
}

function spin(){
  if(spinning)return;
  spinning=true; spinCount++;
  const arm=document.getElementById('leverArm'); arm.classList.add('off');

  let final;
  
  if (spinCount <= presetOrder.length) {
    const targetEn = presetOrder[spinCount - 1];
    final = countries.find(c => c.en === targetEn);
  } else {
    let availablePool = countries.filter(c => !historyQueue.includes(c.en));
    if(availablePool.length === 0) { 
      historyQueue = []; 
      availablePool = [...countries]; 
    }
    final = availablePool[Math.floor(Math.random() * availablePool.length)];
  }
  
  historyQueue.push(final.en);

  arm.style.transition='transform 0.08s ease-in'; 
  arm.style.transform='translateY(-50%) rotateX(80deg)';

  setTimeout(()=>{
    const T=20, track=document.getElementById('reelTrack'), itemH=getItemHeight();
    buildReel(final,T); 
    track.style.transition='none'; 
    track.style.transform='translateY(0px)';
    
    let tickInt=30, elapsed=0;
    function doTick(){ 
      playTick(300+Math.random()*200, elapsed>1000?0.1:0.06); 
      tickInt=elapsed<800?30+Math.random()*20:40+elapsed*0.12; 
      elapsed+=tickInt; 
      if(elapsed<1600)setTimeout(doTick,tickInt); 
    }
    setTimeout(doTick,20);

    const phases=[
      {d:300,e:'cubic-bezier(0.5,0,1,1)',y:-(itemH*6)},
      {d:700,e:'linear',y:-(itemH*(T-5))},
      {d:400,e:'cubic-bezier(0,0,0.2,1)',y:-(itemH*T)},
      {d:150,e:'cubic-bezier(0.34,1.5,0.64,1)',y:-(itemH*T)+(itemH*0.05)},
      {d:100,e:'ease-in-out',y:-(itemH*T)}
    ];

    function runPhase(i){
      if(i>=phases.length){endSpin(final, T);return;}
      const p=phases[i];
      setTimeout(()=>{
        track.style.transition=`transform ${p.d}ms ${p.e}`;
        track.style.transform=`translateY(${p.y}px)`;
        setTimeout(()=>runPhase(i+1),p.d);
      },10);
    }
    requestAnimationFrame(()=>runPhase(0));
  },100); 
}

function endSpin(country, T){
  spinning=false; playWin();
  const track=document.getElementById('reelTrack'); 
  const items=track.querySelectorAll('.ritem'); 
  if(items[T])items[T].classList.add('hi');
  document.getElementById('spinCount').textContent = `已抽 ${spinCount} 次`;
  
  const arm=document.getElementById('leverArm'); 
  arm.style.transition='transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.4)'; 
  arm.style.transform='translateY(-50%) rotateX(-20deg)';
  
  setTimeout(()=>arm.classList.remove('off'), 200);
}
</script>
</body>
</html>

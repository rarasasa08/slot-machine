<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Chungli Toastmasters Super Slot Machine (2/3 Scale)</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;0,900;1,900&family=Space+Mono:wght@400;700&display=swap');

    body {
        margin: 0;
        padding: 0;
        /* 確保 body 佔滿全螢幕，以便內部元件計算百分比 */
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0a2e1f; 
        overflow: hidden;
        font-family: 'Space Mono', monospace;
        /* 設定基準字體大小，以便內部使用 rem 計算 */
        font-size: 16px; 
    }

    .sr-only {
        display: none;
    }

    /* 最外層容器：確保絕對置中 */
    .sm-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
    }

    /* 遊戲舞台 */
    .sm-stage {
        position: relative;
        /* 修改：Stage 的高度設為視窗高度的 66%，即 2/3 */
        height: 66vh; 
        /* 修改：寬度也設定為相對比例，例如視窗寬度的一半 */
        width: 50vw; 
        min-width: 400px; /* 設定最小寬度預防變形 */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 拉霸機主體外殼 (Cabinet) */
    .cab {
        position: relative;
        /* 修改：外殼填滿 Stage 的高度和寬度 */
        width: 100%;
        height: 100%;
        background: #131d06;
        /* 修改：邊框粗細也改為相對單位 */
        border: 0.8vmin solid #c9a030; 
        border-radius: 2vmin 2vmin 1.5vmin 1.5vmin;
        overflow: hidden;
        /* 修改：加強陰影範圍以配合巨型機台 */
        box-shadow: 0 5vh 10vh rgba(0,0,0,0.8);
        z-index: 2;
        display: flex;
        flex-direction: column;
    }

    .cab-inner {
        border: 0.2vmin solid #7a6018;
        border-radius: 1.8vmin 1.8vmin 1vmin 1vmin;
        overflow: hidden;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    /* 控制面板 (Top & Bottom) */
    .cpanel {
        background:#0b1103;
        text-align:center;
        /* 修改：Panel 高度改為相對比例 */
        flex: 0 0 22%; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    .cpanel.tp { border-bottom: 0.4vmin solid #c9a030; }
    .cpanel.bp { border-top: 0.4vmin solid #c9a030; }
    
    /* 修改：面板文字大小全部改為相對單位 (vmin) */
    .pdeco { font-size: 1.8vmin; color: #c9a030; letter-spacing: 0.8vmin; line-height: 1.5; }
    .pline { border: none; border-top: 0.2vmin solid #5a4808; margin: 0.5vh 10%; width: 80%; }
    .ptit { font-family: 'Playfair Display', serif; font-size: 6vmin; font-weight: 900; color: #f2c828; letter-spacing: 0.6vmin; line-height: 1.1; }
    .psub { font-family: 'Playfair Display', serif; font-size: 2.2vmin; font-weight: 700; font-style: italic; color: #c9a030; letter-spacing: 1.2vmin; }
    
    /* 轉盤區域 (Reel Section) */
    .rsect {
        flex: 1; /* 佔滿剩餘高度 */
        padding: 2vmin;
        background: #162309;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vmin;
    }

    .rframe { background: #c9a030; border-radius: 1vmin; padding: 0.6vmin; width: 90%; }
    .rframe-inner { background: #b8860c; border-radius: 0.8vmin; padding: 0.4vmin; }
    
    /* 修改：轉盤視窗高度也設為相對比例 */
    .rwin {
        background: #f0ebd6;
        border-radius: 0.5vmin;
        height: 20vh; /* 轉盤本身佔螢幕高度的 1/5 */
        overflow: hidden;
        position: relative;
        width: 100%;
    }

    /* 修改：遮罩效果高度同步調整 */
    .rwin::before { content:''; position:absolute; top:0; left:0; right:0; height:5vh; background:linear-gradient(to bottom,#f0ebd6,transparent); z-index:2; pointer-events:none; }
    .rwin::after { content:''; position:absolute; bottom:0; left:0; right:0; height:5vh; background:linear-gradient(to top,#f0ebd6,transparent); z-index:2; pointer-events:none; }
    
    .sline { position:absolute; left:1vmin; right:1vmin; top:50%; height:0.3vmin; background:#c9a030; transform:translateY(-50%); z-index:3; opacity:.45; }
    
    .rtrack { display:flex; flex-direction:column; align-items:center; position:absolute; width:100%; }
    
    /* 修改：Reel Item 高度與 JavaScript 中的 ITEM_HEIGHT 保持一致 (using vh) */
    .ritem {
        height: 20vh; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 100%;
        text-align: center;
        gap: 0.5vmin;
    }

    /* 修改：國家名稱字體放大，使用 vmin 確保縮放平衡 */
    .ren { font-family: 'Playfair Display', serif; font-size: 7vmin; font-weight: 900; color: #1a1205; line-height: 1; }
    .rzh { font-family: 'Space Mono', monospace; font-size: 2.5vmin; color: #888; letter-spacing: 0.2vmin; }
    .ritem.hi .ren { color: #8b1800; }
    .ritem.hi .rzh { color: #b8960c; }
    
    .scnt { font-family: 'Space Mono', monospace; font-size: 2.2vmin; color: #c9a030; letter-spacing: 0.4vmin; min-height: 3vmin; margin-top: 1vh; }
    
    /* 修改：把手基座與桿子也改
